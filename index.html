<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora JS</title>
</head>
<body>
    <div class="calculadora">
        <div class="resultado">0</div>

        <div class="botoes">
            <button class="btCinza">AC</button>
            <button class="btCinza">+/-</button>
            <button class="btCinza">%</button>
            <button class="btLaranja">/</button>

            <button class="btCinzaclaro">7</button>
            <button class="btCinzaclaro">8</button>
            <button class="btCinzaclaro">9</button>
            <button class="btLaranja">x</button>

            <button class="btCinzaclaro">4</button>
            <button class="btCinzaclaro">5</button>
            <button class="btCinzaclaro">6</button>
            <button class="btLaranja">-</button>

            <button class="btCinzaclaro">1</button>
            <button class="btCinzaclaro">2</button>
            <button class="btCinzaclaro">3</button>
            <button class="btLaranja">+</button>

            <button class="btCinzaclaro btZero">0</button>
            <button class="btCinzaclaro">,</button>
            <button class="btLaranja">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
